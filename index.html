<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SmartBiz | Login</title>

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <!-- Lado esquerdo -->
        <div class="left">

            <div class="logo">
                <i class="fa-solid fa-chart-line"></i>
                <h1>SmartBiz</h1>
            </div>

            <h2>Sistema Inteligente para Gestão de Pequenos Negócios</h2>

            <p>
                Controle vendas, estoque, clientes, financeiro e acompanhe
                relatórios inteligentes em um único lugar.
            </p>

        </div>

        <!-- Lado direito -->
        <div class="right">

            <form class="login">

                <h2>Entrar</h2>

                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input
                        type="email"
                        placeholder="E-mail"
                        required>
                </div>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input
                        type="password"
                        placeholder="Senha"
                        required>
                </div>

                <div class="options">

                    <label>
                        <input type="checkbox">
                        Lembrar-me
                    </label>

                    <a href="#">
                        Esqueceu a senha?
                    </a>

                </div>

                <button type="submit">
                    Entrar
                </button>

                <p class="copyright">
                    © 2026 SmartBiz - Todos os direitos reservados.
                </p>

            </form>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
