<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Smart Burger - Sistema</title>

    <link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/extras.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        header {
            background: #ffb000;
            color: black;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .welcome {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            background: #ffb000;
            color: black;
            transform: translateY(-5px);
        }

        .card a {
            text-decoration: none;
            color: inherit;
            font-weight: bold;
        }

        .user-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .user-box button {
            padding: 10px;
            border: none;
            background: red;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>
    <h1>🍔 Smart Burger - Sistema de Gestão</h1>
</header>

<div class="container">

    <!-- USUÁRIO -->
    <div class="user-box">
        <p>Bem-vindo, <strong id="usuario">Administrador</strong></p>
        <button onclick="logout()">Sair</button>
    </div>

    <!-- BOAS VINDAS -->
    <div class="welcome">
        <h2>Bem-vindo ao Smart Burger 🍔</h2>
        <p>Escolha uma opção para gerenciar o sistema</p>
    </div>

    <!-- MENU -->
    <div class="menu">

        <div class="card">
            <a href="produtos.html">🍔 Produtos</a>
        </div>

        <div class="card">
            <a href="pedidos.html">🧾 Pedidos</a>
        </div>

        <div class="card">
            <a href="estoque.html">📦 Estoque</a>
        </div>

        <div class="card">
            <a href="fornecedores.html">🚚 Fornecedores</a>
        </div>

        <div class="card">
            <a href="financeiro.html">💰 Financeiro</a>
        </div>

        <div class="card">
            <a href="relatorios.html">📊 Relatórios</a>
        </div>

        <div class="card">
            <a href="configuracoes.html">⚙️ Configurações</a>
        </div>

        <div class="card">
            <a href="perfil.html">👤 Perfil</a>
        </div>

    </div>

</div>

<script>
    // Mostrar usuário salvo
    window.onload = function () {
        const usuario = localStorage.getItem("usuario") || "Administrador";
        document.getElementById("usuario").innerText = usuario;
    };

    // Logout
    function logout() {
        alert("Saindo do sistema...");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
