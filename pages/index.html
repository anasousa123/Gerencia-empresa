<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Burguer ERP</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#111,#1f1f1f,#2d2d2d);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .loading{
            text-align:center;
        }

        .loading h1{
            font-size:42px;
            color:#ffb300;
            margin-bottom:15px;
        }

        .loading p{
            color:#ddd;
            margin-bottom:25px;
        }

        .loader{
            width:60px;
            height:60px;
            border:6px solid #444;
            border-top:6px solid #ffb300;
            border-radius:50%;
            animation:girar 1s linear infinite;
            margin:auto;
        }

        @keyframes girar{
            100%{
                transform:rotate(360deg);
            }
        }
    </style>
</head>

<body>

<div class="loading">

    <h1>🍔 Smart Burguer ERP</h1>

    <p>Carregando sistema...</p>

    <div class="loader"></div>

</div>

<script>

setTimeout(function(){

    window.location.href="pages/dashboard.html";

},1500);

</script>

</body>

</html>
