<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SMART BURGUER GERENCIA</title>

    <meta name="description" content="Sistema Inteligente de Gestão Empresarial">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- =======================
         SIDEBAR
    ======================== -->

    <aside class="sidebar" id="sidebar">

        <div class="logo">

            <i class="fa-solid fa-burger"></i>

            <div>

                <h2>SMART ERP</h2>

                <span>Business System</span>

            </div>

        </div>

        <nav>

            <ul>

                <li class="active">

                    <a href="#">

                        <i class="fa-solid fa-chart-line"></i>

                        <span>Dashboard</span>

                    </a>

                </li>

                <li>

                    <a href="#">

                        <i class="fa-solid fa-box"></i>

                        <span>Produtos</span>

                    </a>

                </li>

                <li>

                    <a href="#">

                        <i class="fa-solid fa-cart-shopping"></i>

                        <span>Pedidos</span>

                    </a>

                </li>

                <li>

                    <a href="#">

                        <i class="fa-solid fa-users"></i>

                        <span>Clientes</span>

                    </a>

                </li>

                <li>

                    <a href="#">

                        <i class="fa-solid fa-warehouse"></i>

                        <span>Estoque</span>

                    </a>

                </li>

                <li>

                    <a href="#">

                        <i class="fa-solid fa-money-bill-trend-up"></i>

                        <span>Financeiro</span>

                    </a>

                </li>

                <li>

                    <a href="#">

                        <i class="fa-solid fa-truck"></i>

                        <span>Fornecedores</span>

                    </a>

                </li>

                <li>

                    <a href="#">

                        <i class="fa-solid fa-chart-pie"></i>

                        <span>Relatórios</span>

                    </a>

                </li>

                <li>

                    <a href="#">

                        <i class="fa-solid fa-gear"></i>

                        <span>Configurações</span>

                    </a>

                </li>

            </ul>

        </nav>

    </aside>

    <!-- =======================
         CONTEÚDO
    ======================== -->

    <main class="main">

        <!-- TOPO -->

        <header class="topbar">

            <div class="top-left">

                <button id="btnMenu">

                    <i class="fa-solid fa-bars"></i>

                </button>

                <div class="search">

                    <i class="fa-solid fa-magnifying-glass"></i>

                    <input type="text" placeholder="Pesquisar produtos, clientes, pedidos...">

                </div>

            </div>

            <div class="top-right">

                <button class="icon-btn">

                    <i class="fa-regular fa-bell"></i>

                </button>

                <button class="icon-btn">

                    <i class="fa-regular fa-envelope"></i>

                </button>

                <div class="user">

                    <img src="assets/avatar.png" alt="Administrador">

                    <div>

                        <h4>Ana Sousa</h4>

                        <span>Administrador</span>

                    </div>

                </div>

            </div>

        </header>

        <!-- CONTEÚDO -->

        <section class="content">

            <div class="page-title">

                <div>

                    <h1>Dashboard</h1>

                    <p>Bem-vinda ao SMART BURGUER ERP</p>

                </div>

                <button class="btn-primary">

                    <i class="fa-solid fa-plus"></i>

                    Novo Pedido

                </button>

            </div>

            <!-- CARDS -->

            <div class="cards">

                <div class="card">

                    <div>

                        <h3>Pedidos Hoje</h3>

                        <h2>0</h2>

                    </div>

                    <i class="fa-solid fa-cart-shopping"></i>

                </div>

                <div class="card">

                    <div>

                        <h3>Faturamento</h3>

                        <h2>R$ 0,00</h2>

                    </div>

                    <i class="fa-solid fa-sack-dollar"></i>

                </div>

                <div class="card">

                    <div>

                        <h3>Clientes</h3>

                        <h2>0</h2>

                    </div>

                    <i class="fa-solid fa-users"></i>

                </div>

                <div class="card">

                    <div>

                        <h3>Produtos</h3>

                        <h2>0</h2>

                    </div>

                    <i class="fa-solid fa-box"></i>

                </div>

            </div>

            <!-- ÁREA DOS MÓDULOS -->

            <div id="conteudoSistema">

                <!-- Dashboard será carregado aqui nas próximas etapas -->

            </div>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>

</html>
