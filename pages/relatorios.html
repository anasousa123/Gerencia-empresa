<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Smart Burger - Relatórios</title>

    <link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/extras.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            margin: 0;
        }

        header {
            background: #ffb000;
            color: black;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .card h2 {
            font-size: 28px;
            margin: 10px 0;
            color: #ffb000;
        }
    </style>
</head>

<body>

<header>
    <h1>📊 Smart Burger - Relatórios</h1>
</header>

<div class="container">

    <div class="cards">

        <div class="card">
            <h3>🍔 Produtos</h3>
            <h2 id="totalProdutos">0</h2>
        </div>

        <div class="card">
            <h3>🧾 Pedidos</h3>
            <h2 id="totalPedidos">0</h2>
        </div>

        <div class="card">
            <h3>⏳ Pendentes</h3>
            <h2 id="pedidosPendentes">0</h2>
        </div>

        <div class="card">
            <h3>✔️ Concluídos</h3>
            <h2 id="pedidosConcluidos">0</h2>
        </div>

        <div class="card">
            <h3>🚚 Fornecedores</h3>
            <h2 id="totalFornecedores">0</h2>
        </div>

    </div>

</div>

<script src="relatorios.js"></script>

</body>
</html>
