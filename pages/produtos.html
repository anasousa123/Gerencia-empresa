<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Produtos | SMART BURGUER ERP</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="../css/produtos.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<section class="produtos fade">

    <!-- CABEÇALHO -->

    <div class="titulo-pagina">

        <div>

            <h1>Produtos</h1>

            <p>Gerencie todos os produtos da empresa</p>

        </div>

        <button
            id="novoProduto"
            class="btn-primary">

            <i class="fa-solid fa-plus"></i>

            Novo Produto

        </button>

    </div>

    <!-- FILTROS -->

    <div class="barra-filtros">

        <div class="pesquisa">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="pesquisarProduto"
                placeholder="Pesquisar produto...">

        </div>

        <select id="categoriaFiltro">

            <option value="">Todas Categorias</option>

            <option>Hambúrguer</option>

            <option>Pizza</option>

            <option>Porção</option>

            <option>Bebida</option>

            <option>Sobremesa</option>

        </select>

    </div>

    <!-- TABELA -->

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>Foto</th>

                    <th>Produto</th>

                    <th>Categoria</th>

                    <th>Preço</th>

                    <th>Estoque</th>

                    <th>Status</th>

                    <th>Ações</th>

                </tr>

            </thead>

            <tbody id="listaProdutos">

            </tbody>

        </table>

    </div>

    <!-- MODAL -->

    <div
        class="modal"
        id="modalProduto">

        <div class="modal-content">

            <div class="modal-header">

                <h2>Novo Produto</h2>

                <span
                    class="fechar">

                    &times;

                </span>

            </div>

            <form
                id="formProduto">

                <div class="form-grid">

                    <div class="form-group">

                        <label>Nome</label>

                        <input
                            type="text"
                            id="nomeProduto"
                            required>

                    </div>

                    <div class="form-group">

                        <label>Categoria</label>

                        <select
                            id="categoriaProduto">

                            <option>Hambúrguer</option>

                            <option>Pizza</option>

                            <option>Porção</option>

                            <option>Bebida</option>

                            <option>Sobremesa</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label>Preço</label>

                        <input
                            type="number"
                            step="0.01"
                            id="precoProduto">

                    </div>

                    <div class="form-group">

                        <label>Estoque</label>

                        <input
                            type="number"
                            id="estoqueProduto">

                    </div>

                    <div class="form-group">

                        <label>Imagem</label>

                        <input
                            type="file"
                            id="imagemProduto"
                            accept="image/*">

                    </div>

                    <div class="form-group">

                        <label>Status</label>

                        <select id="statusProduto">

                            <option>Ativo</option>

                            <option>Inativo</option>

                        </select>

                    </div>

                </div>

                <div class="acoes-modal">

                    <button
                        type="button"
                        class="btn-secondary cancelar">

                        Cancelar

                    </button>

                    <button
                        type="submit"
                        class="btn-primary">

                        Salvar Produto

                    </button>

                </div>

            </form>

        </div>

    </div>

</section>

<script src="../js/produtos.js"></script>

</body>

</html>
    <!-- RESUMO -->

    <section class="cards-resumo">

        <div class="card-resumo">

            <i class="fa-solid fa-box"></i>

            <div>

                <h3 id="totalProdutos">0</h3>

                <span>Total de Produtos</span>

            </div>

        </div>

        <div class="card-resumo">

            <i class="fa-solid fa-circle-check"></i>

            <div>

                <h3 id="produtosAtivos">0</h3>

                <span>Produtos Ativos</span>

            </div>

        </div>

        <div class="card-resumo">

            <i class="fa-solid fa-triangle-exclamation"></i>

            <div>

                <h3 id="estoqueBaixo">0</h3>

                <span>Estoque Baixo</span>

            </div>

        </div>

        <div class="card-resumo">

            <i class="fa-solid fa-tags"></i>

            <div>

                <h3 id="categoriasTotal">0</h3>

                <span>Categorias</span>

            </div>

        </div>

    </section>

    <!-- VISUALIZAÇÃO EM CARDS -->

    <section>

        <div class="titulo-lista">

            <h2>Visualização dos Produtos</h2>

        </div>

        <div id="gridProdutos" class="grid-produtos">

        </div>

    </section>

    <!-- PAGINAÇÃO -->

    <div class="paginacao">

        <button id="paginaAnterior">

            <i class="fa-solid fa-chevron-left"></i>

        </button>

        <span id="paginaAtual">

            Página 1

        </span>

        <button id="paginaProxima">

            <i class="fa-solid fa-chevron-right"></i>

        </button>

    </div>

    <!-- MODAL VISUALIZAR -->

    <div class="modal" id="modalVisualizar">

        <div class="modal-content modal-produto">

            <span class="fechar" id="fecharVisualizar">

                &times;

            </span>

            <img
                id="imagemVisualizar"
                src=""
                alt="Produto">

            <h2 id="tituloVisualizar">

                Produto

            </h2>

            <p>

                <strong>Categoria:</strong>

                <span id="categoriaVisualizar"></span>

            </p>

            <p>

                <strong>Preço:</strong>

                <span id="precoVisualizar"></span>

            </p>

            <p>

                <strong>Estoque:</strong>

                <span id="estoqueVisualizar"></span>

            </p>

            <p>

                <strong>Status:</strong>

                <span id="statusVisualizar"></span>

            </p>

            <button
                class="btn-primary"
                id="editarProduto">

                <i class="fa-solid fa-pen"></i>

                Editar Produto

            </button>

        </div>

    </div>

</section>

<script src="../js/produtos.js"></script>

</body>

</html>
