<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Smart Burger - Pedidos</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            margin: 0;
            padding: 0;
        }

        header {
            background: #ffb000;
            color: black;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .form-pedido {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .form-pedido input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border: none;
        }

        .form-pedido button {
            background: #ffb000;
            border: none;
            padding: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            gap: 10px;
        }

        .stat-box {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            text-align: center;
        }

        .filtros {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .filtros button {
            padding: 10px;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .filtros button:hover {
            background: #ffb000;
            color: black;
        }

        .pedido-card {
            background: #1e1e1e;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .pedido-card button {
            margin-right: 5px;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .pedido-card button:first-of-type {
            background: green;
            color: white;
        }

        .pedido-card button:last-of-type {
            background: red;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>🍔 Smart Burger - Sistema de Pedidos</h1>
</header>

<div class="container">

    <!-- FORMULÁRIO -->
    <div class="form-pedido">
        <h2>Novo Pedido</h2>

        <input type="text" id="cliente" placeholder="Nome do cliente">
        <input type="text" id="item" placeholder="Item (ex: X-Burger)">
        <input type="number" id="quantidade" placeholder="Quantidade">

        <button onclick="adicionarPedido()">Adicionar Pedido</button>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-box">
            <h3>Total</h3>
            <p id="totalPedidos">0</p>
        </div>

        <div class="stat-box">
            <h3>Pendentes</h3>
            <p id="pedidosPendentes">0</p>
        </div>

        <div class="stat-box">
            <h3>Concluídos</h3>
            <p id="pedidosConcluidos">0</p>
        </div>
    </div>

    <!-- FILTROS -->
    <div class="filtros">
        <button onclick="filtrarPedidos('Todos')">Todos</button>
        <button onclick="filtrarPedidos('Pendente')">Pendentes</button>
        <button onclick="filtrarPedidos('Concluído')">Concluídos</button>
    </div>

    <!-- LISTA -->
    <div id="listaPedidos"></div>

</div>

<script src="pedidos.js"></script>

</body>
</html>
