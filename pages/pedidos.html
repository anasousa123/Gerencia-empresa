<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus ERP | Pedidos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet" href="../css/pedidos.css">

</head>

<body>

<div class="dashboard">

<aside class="sidebar">

<div class="logo">

<i class="fa-solid fa-burger"></i>

<h2>Nexus ERP</h2>

</div>

<ul>

<li onclick="location.href='dashboard.html'">

<i class="fa-solid fa-house"></i>

<span>Dashboard</span>

</li>

<li onclick="location.href='produtos.html'">

<i class="fa-solid fa-box"></i>

<span>Produtos</span>

</li>

<li onclick="location.href='estoque.html'">

<i class="fa-solid fa-layer-group"></i>

<span>Estoque</span>

</li>

<li class="active">

<i class="fa-solid fa-cart-shopping"></i>

<span>Pedidos</span>

</li>

<li>

<i class="fa-solid fa-users"></i>

<span>Clientes</span>

</li>

<li>

<i class="fa-solid fa-money-bill"></i>

<span>Financeiro</span>

</li>

</ul>

</aside>

<main class="content">

<header>

<div>

<h1>Pedidos</h1>

<p>Gerencie todos os pedidos da hamburgueria.</p>

</div>

<button class="btn-primary" id="btnPedido">

<i class="fa-solid fa-plus"></i>

Novo Pedido

</button>

</header>
<!-- ===========================
CARDS
=========================== -->

<section class="cards">

    <div class="card">

        <i class="fa-solid fa-cart-shopping"></i>

        <h3>Pedidos Hoje</h3>

        <h2 id="pedidosHoje">0</h2>

    </div>

    <div class="card">

        <i class="fa-solid fa-spinner"></i>

        <h3>Em Preparo</h3>

        <h2 id="preparo">0</h2>

    </div>

    <div class="card">

        <i class="fa-solid fa-motorcycle"></i>

        <h3>Em Entrega</h3>

        <h2 id="entrega">0</h2>

    </div>

    <div class="card">

        <i class="fa-solid fa-sack-dollar"></i>

        <h3>Faturamento</h3>

        <h2 id="faturamento">R$ 0,00</h2>

    </div>

</section>

<!-- ===========================
PESQUISA
=========================== -->

<section class="top-bar">

    <div class="pesquisa">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
            type="text"
            id="pesquisar"
            placeholder="Pesquisar pedido ou cliente">

    </div>

</section>

<!-- ===========================
TABELA
=========================== -->

<section class="tabela">

<table>

<thead>

<tr>

<th>Nº</th>

<th>Cliente</th>

<th>Telefone</th>

<th>Total</th>

<th>Pagamento</th>

<th>Status</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="listaPedidos">

<!-- JavaScript -->

</tbody>

</table>

</section>

</main>

</div>

<!-- ===========================
MODAL
=========================== -->

<div class="modal" id="modalPedido">

<div class="modal-content">

<div class="modal-header">

<h2>Novo Pedido</h2>

<button id="fecharModal">

<i class="fa-solid fa-xmark"></i>

</button>

</div>

<form id="formPedido">

<div class="grupo">

<label>Cliente</label>

<input
type="text"
id="cliente"
required>

</div>

<div class="grupo">

<label>Telefone</label>

<input
type="text"
id="telefone"
required>

</div>

<div class="grupo">

<label>Produto</label>

<select id="produto">

<option value="">Selecione um produto</option>

</select>

</div>

<div class="linha">

<div class="grupo">

<label>Quantidade</label>

<input
type="number"
id="quantidade"
value="1"
min="1">

</div>

<div class="grupo">

<label>Pagamento</label>

<select id="pagamento">

<option>PIX</option>

<option>Dinheiro</option>

<option>Cartão de Débito</option>

<option>Cartão de Crédito</option>

</select>

</div>

</div>

<div class="grupo">

<label>Status</label>

<select id="status">

<option>Em preparo</option>

<option>Saiu para entrega</option>

<option>Finalizado</option>

<option>Cancelado</option>

</select>

</div>

<div class="grupo">

<label>Observações</label>

<textarea
id="observacoes"
rows="3"
placeholder="Ex.: sem cebola, ponto da carne, etc."></textarea>

</div>

<div class="botoes">

<button
type="button"
class="cancelar">

Cancelar

</button>

<button
type="submit"
class="salvar">

Salvar Pedido

</button>

</div>

</form>

</div>

</div>

<script src="../js/pedidos.js"></script>

</body>

</html>
