<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Perfil | SMART BURGUER ERP</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="../css/perfil.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<section class="perfil fade">

    <div class="titulo-pagina">

        <div>

            <h1>Meu Perfil</h1>

            <p>Gerencie suas informações pessoais</p>

        </div>

        <button class="btn-primary" id="btnSalvar">

            <i class="fa-solid fa-floppy-disk"></i>

            Salvar Alterações

        </button>

    </div>

    <!-- PERFIL -->

    <div class="perfil-container">

        <!-- LADO ESQUERDO -->

        <div class="perfil-card">

            <div class="foto-perfil">

                <img
                id="fotoUsuario"
                src="../assets/avatar.png"
                alt="Usuário">

                <button id="trocarFoto">

                    <i class="fa-solid fa-camera"></i>

                </button>

            </div>

            <h2 id="nomePerfil">

                Ana Sousa

            </h2>

            <span>

                Administrador

            </span>

            <div class="estatisticas">

                <div>

                    <h3>152</h3>

                    <p>Pedidos</p>

                </div>

                <div>

                    <h3>85</h3>

                    <p>Clientes</p>

                </div>

                <div>

                    <h3>94</h3>

                    <p>Produtos</p>

                </div>

            </div>

        </div>

        <!-- LADO DIREITO -->

        <div class="perfil-formulario">

            <h2>

                Informações Pessoais

            </h2>

            <div class="form-grid">

                <div class="form-group">

                    <label>Nome Completo</label>

                    <input
                    type="text"
                    id="nome"
                    value="Ana Sousa">

                </div>

                <div class="form-group">

                    <label>E-mail</label>

                    <input
                    type="email"
                    id="email"
                    value="ana@email.com">

                </div>

                <div class="form-group">

                    <label>Telefone</label>

                    <input
                    type="text"
                    id="telefone"
                    placeholder="(00)00000-0000">

                </div>

                <div class="form-group">

                    <label>Cargo</label>

                    <input
                    type="text"
                    value="Administrador">

                </div>

                <div class="form-group">

                    <label>CPF</label>

                    <input
                    type="text"
                    placeholder="000.000.000-00">

                </div>

                <div class="form-group">

                    <label>Data de Nascimento</label>

                    <input
                    type="date">

                </div>

            </div>
                        <!-- ENDEREÇO -->

            <h2 class="titulo-secao">

                Endereço

            </h2>

            <div class="form-grid">

                <div class="form-group">

                    <label>CEP</label>

                    <input
                    type="text"
                    id="cep"
                    placeholder="00000-000">

                </div>

                <div class="form-group">

                    <label>Cidade</label>

                    <input
                    type="text"
                    id="cidade">

                </div>

                <div class="form-group">

                    <label>Estado</label>

                    <input
                    type="text"
                    id="estado">

                </div>

                <div class="form-group">

                    <label>Bairro</label>

                    <input
                    type="text"
                    id="bairro">

                </div>

                <div class="form-group">

                    <label>Rua</label>

                    <input
                    type="text"
                    id="rua">

                </div>

                <div class="form-group">

                    <label>Número</label>

                    <input
                    type="text"
                    id="numero">

                </div>

            </div>

            <!-- ALTERAR SENHA -->

            <h2 class="titulo-secao">

                Segurança

            </h2>

            <div class="form-grid">

                <div class="form-group">

                    <label>Senha Atual</label>

                    <input
                    type="password"
                    id="senhaAtual">

                </div>

                <div class="form-group">

                    <label>Nova Senha</label>

                    <input
                    type="password"
                    id="novaSenha">

                </div>

                <div class="form-group">

                    <label>Confirmar Senha</label>

                    <input
                    type="password"
                    id="confirmarSenha">

                </div>

            </div>

            <!-- PREFERÊNCIAS -->

            <h2 class="titulo-secao">

                Preferências

            </h2>

            <div class="preferencias">

                <label>

                    <input
                    type="checkbox"
                    checked>

                    Receber notificações do sistema

                </label>

                <label>

                    <input
                    type="checkbox"
                    checked>

                    Receber e-mails

                </label>

                <label>

                    <input
                    type="checkbox">

                    Ativar modo escuro

                </label>

            </div>

        </div>

    </div>

</section>

<script src="../js/perfil.js"></script>

</body>

</html>
